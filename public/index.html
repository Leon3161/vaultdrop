<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultDrop — Secure File Sharing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="logo-section">
                <div class="logo">
                    <svg viewBox="0 0 60 60" class="logo-icon">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#6366f1"/>
                                <stop offset="100%" style="stop-color:#8b5cf6"/>
                            </linearGradient>
                            <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#818cf8"/>
                                <stop offset="100%" style="stop-color:#a78bfa"/>
                            </linearGradient>
                        </defs>
                        <!-- Vault/Shield shape -->
                        <path d="M30 4 L52 14 L52 28 C52 42 42 52 30 56 C18 52 8 42 8 28 L8 14 Z" 
                              fill="url(#logoGrad)" opacity="0.9"/>
                        <!-- Inner shield highlight -->
                        <path d="M30 10 L46 18 L46 28 C46 39 38 47 30 50 C22 47 14 39 14 28 L14 18 Z" 
                              fill="url(#shieldGrad)" opacity="0.3"/>
                        <!-- Drop/Arrow icon -->
                        <path d="M30 20 L30 38 M22 30 L30 38 L38 30" 
                              stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <!-- Lock circle -->
                        <circle cx="30" cy="44" r="4" fill="white" opacity="0.9"/>
                        <rect x="28" y="43" width="4" height="3" rx="1" fill="url(#logoGrad)"/>
                    </svg>
                </div>
                <h1 class="app-name">VaultDrop</h1>
                <p class="app-tagline">Secure File Sharing</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="username">Benutzername</label>
                    <input type="text" id="username" name="username" placeholder="Benutzername eingeben" autocomplete="username" required>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" name="password" placeholder="Passwort eingeben" autocomplete="current-password" required>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    <span>Anmelden</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                <div id="login-error" class="error-message"></div>
            </form>

        </div>
        <div class="login-bg-decoration">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="screen">
        <header class="app-header">
            <div class="header-left">
                <svg viewBox="0 0 60 60" class="header-logo">
                    <path d="M30 4 L52 14 L52 28 C52 42 42 52 30 56 C18 52 8 42 8 28 L8 14 Z" fill="url(#logoGrad)" opacity="0.9"/>
                    <path d="M30 20 L30 38 M22 30 L30 38 L38 30" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="30" cy="44" r="4" fill="white" opacity="0.9"/>
                    <rect x="28" y="43" width="4" height="3" rx="1" fill="#6366f1"/>
                </svg>
                <span class="header-title">VaultDrop</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <span id="user-display-name">Admin</span>
                </div>
                <button class="btn btn-ghost btn-logout" id="btn-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Abmelden</span>
                </button>
            </div>
        </header>

        <main class="app-main">
            <!-- UPLOAD SECTION -->
            <section class="upload-section">
                <div class="upload-zone" id="upload-zone">
                    <div class="upload-icon">
                        <svg viewBox="0 0 64 64" fill="none">
                            <circle cx="32" cy="32" r="30" stroke="currentColor" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>
                            <path d="M32 44 L32 20 M24 28 L32 20 L40 28" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <p class="upload-text">Datei hierher ziehen oder <span class="upload-browse">durchsuchen</span></p>
                    <p class="upload-hint">Maximale Dateigröße: 50 MB</p>
                    <input type="file" id="file-input" hidden>
                </div>

                <!-- Upload form (appears after file selection) -->
                <div class="upload-form" id="upload-form" style="display:none;">
                    <div class="selected-file" id="selected-file-info">
                        <div class="file-icon-preview">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14,2 14,8 20,8"/>
                            </svg>
                        </div>
                        <div class="file-details">
                            <span class="file-name" id="selected-file-name">filename.pdf</span>
                            <span class="file-size" id="selected-file-size">2.4 MB</span>
                        </div>
                        <button class="btn btn-icon btn-remove-file" id="btn-remove-file">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-group">
                        <label for="file-password">Datei-Passwort</label>
                        <input type="password" id="file-password" placeholder="Passwort zum Schützen der Datei" required>
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </div>
                    </div>
                    <button class="btn btn-primary btn-upload" id="btn-upload">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17,8 12,3 7,8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span>Hochladen & Sichern</span>
                    </button>
                </div>

                <!-- Upload progress -->
                <div class="upload-progress" id="upload-progress" style="display:none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p class="progress-text" id="progress-text">Wird hochgeladen...</p>
                </div>
            </section>

            <!-- FILES LIST -->
            <section class="files-section">
                <div class="files-header">
                    <h2>Gesicherte Dateien</h2>
                    <span class="file-count" id="file-count">0 Dateien</span>
                </div>
                <div class="files-list" id="files-list">
                    <!-- Files will be rendered here -->
                </div>
                <div class="files-empty" id="files-empty" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    <p>Noch keine Dateien hochgeladen</p>
                </div>
            </section>
        </main>
    </div>

    <!-- PASSWORD MODAL -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="download-modal">
            <div class="modal-header">
                <h3>Datei herunterladen</h3>
                <button class="btn btn-icon btn-close-modal" id="btn-close-modal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-file-name" id="modal-file-name">filename.pdf</p>
                <div class="input-group">
                    <label for="download-password">Datei-Passwort eingeben</label>
                    <input type="password" id="download-password" placeholder="Passwort eingeben">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>
                <div id="modal-error" class="error-message"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-cancel-download">Abbrechen</button>
                <button class="btn btn-primary" id="btn-confirm-download">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7,10 12,15 17,10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Herunterladen</span>
                </button>
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
